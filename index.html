<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro com Bootstrap</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
<body class="bg_img">

<main class="align">

<form action="" id="formulario" class="shadow p-3 mb-5 bg-dark-subtle rounded m-5 opacity-75 col-md-5">
        <div>
            <h1 class="text-center">Login do Fórum de Hearts of Iron IV</h1>
            <p class="text-center">Preencha os dados abaixo para logar em sua conta no Fórum de Hearts of Iron IV</p>
        </div>

        <div class="row">
            <div class="col">
                <label for="">Username</label>
                <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1" id="usuario">
            </div>
        </div>

        <div>
            <div class="col">
                <label for="">Senha</label>
                <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1" id="senha">
            </div>
        </div>

        <button type="submit" class="btn btn-primary mt-3 alignRight" id="submit">Fazer Login</button>
</form>

<script src="script.js" ></script>

</body>

</main>
</html>
