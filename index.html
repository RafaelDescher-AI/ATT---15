<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro com Bootstrap</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<body>

<div class="shadow p-3 mb-5 bg-body-tertiary rounded m-5">

    <div>
        <h1 class="text-center">Cadastro de Hearts of Iron IV</h1>
        <p class="text-center">Preencha os dados abaixo para realizar o registro completo do aluno no sistema acadêmico</p>
    </div>

    <div class="row">
        <div class="col">
            <label for="">Nome Completo</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <div class="col">
            <label for="">CPF</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
    </div>

    <div class="row">
        <div class="col">
            <label for="">Data de Nascimento</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <div class="col">
            <label for="">Telefone</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <div class="col">
            <label for="">E-Mail</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
    </div>

    <div>
        <div class="col">
            <label for="">Endereço Completo</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
    </div>

    <div class="row">
        <div class="col">
            <label for="">Cidade</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <div class="col">
            <label for="">Estado</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <div class="col">
            <label for="">CEP</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
    </div>

    <div class="row">
        <div class="col">
            <label for="">Curso</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <div class="col">
            <label for="">Matrícula</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
    </div>

    <div class="row">
        <div class="col">
            <label for="">Senha</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <div class="col">
            <label for="">Confirmar Senha</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
    </div>

    <button type="button" class="btn btn-primary">Cadastrar Aluno</button>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
