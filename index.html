<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro com Bootstrap</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
<body class="bg_img">


<div class="shadow p-3 mb-5 bg-dark-subtle rounded opacity-75 m-5  col-md-4 position-absolute top-50 start-0 translate-middle">
<main class="align">

<div class="shadow p-3 mb-5 bg-body-tertiary rounded m-5 opacity-75 col-md-5">

    <div>
        <h1 class="text-center">Login do Fórum de Hearts of Iron IV</h1>
        <p class="text-center">Preencha os dados abaixo para logar em sua conta no Fórum de Hearts of Iron IV</p>
    </div>

    <div class="row">
        <div class="col">
            <label for="">Username</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
    </div>

    <div>
        <div class="col">
            <label for="">Senha</label>
            <input type="text" class="form-control" aria-label="Username" aria-describedby="basic-addon1">
        </div>
    </div>

    <button type="button" class="btn btn-primary mt-3 alignRight">Fazer Login</button>

</div>

    </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
